<div class="fixed inset-0 z-0">

</div>

<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline italic text-xl tracking-tight text-on-surface">Kaveri River View</h1>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface">share</span>
</button>
</div>
</header>
<!-- Layer Toggle Row -->
<div class="fixed top-24 left-0 w-full z-40">
<div class="flex items-center gap-3 px-6 overflow-x-auto no-scrollbar py-2">
<button class="flex-shrink-0 px-5 py-2 rounded-full bg-primary-container text-white font-label text-sm font-bold tracking-tight shadow-lg">

            </button>
<button class="flex-shrink-0 px-5 py-2 rounded-full bg-surface-container-lowest/90 backdrop-blur-md text-secondary font-label text-sm font-medium border border-outline-variant/20">
                NDVI
            </button>
<button class="flex-shrink-0 px-5 py-2 rounded-full bg-surface-container-lowest/90 backdrop-blur-md text-secondary font-label text-sm font-medium border border-outline-variant/20">

            </button>
<button class="flex-shrink-0 px-5 py-2 rounded-full bg-surface-container-lowest/90 backdrop-blur-md text-secondary font-label text-sm font-medium border border-outline-variant/20">

<button class="flex-shrink-0 px-5 py-2 rounded-full bg-surface-container-lowest/90 backdrop-blur-md text-secondary font-label text-sm font-medium border border-outline-variant/20">

</div>
</div>

</div>
</div>
</div>

<button class="w-12 h-12 bg-surface-container-lowest/90 backdrop-blur-md rounded-xl shadow-lg flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined">layers</span>
</button>

<span class="material-symbols-outlined">my_location</span>
</button>

<div class="flex flex-col md:flex-row md:items-center justify-between gap-6">

<div class="flex items-center gap-2 mb-1">

<span class="material-symbols-outlined text-primary-container text-sm" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<p class="font-label text-sm text-outline flex items-center gap-2">
<span class="material-symbols-outlined text-sm">landscape</span>
                        142.42 ACRES • PERENNIAL WATER ACCESS
                    </p>
</div>

<button class="flex-1 md:flex-none flex flex-col items-center justify-center gap-1 p-3 rounded-2xl bg-surface-container-low hover:bg-surface-container-high transition-colors group">

<span class="text-[10px] font-bold uppercase tracking-tight">Dashboard</span>
</button>
<button class="flex-1 md:flex-none flex flex-col items-center justify-center gap-1 p-3 rounded-2xl bg-surface-container-low hover:bg-surface-container-high transition-colors group">

<span class="text-[10px] font-bold uppercase tracking-tight">Trees</span>
</button>
<button class="flex-1 md:flex-none flex flex-col items-center justify-center gap-1 p-3 rounded-2xl bg-surface-container-low hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined text-primary-container group-active:scale-90 transition-transform">description</span>
<span class="text-[10px] font-bold uppercase tracking-tight">Documents</span>
</button>
