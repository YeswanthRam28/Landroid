<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- Header / Navigation (Suppressed Shelves based on Transactional Logic) -->
<header class="flex items-center px-6 py-6 w-full max-w-lg mx-auto">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors duration-200 group">

</button>
</header>
<main class="flex-1 w-full max-w-lg mx-auto px-6 flex flex-col">
<!-- Heading Section -->
<section class="mt-4 mb-10">
<h1 class="font-headline font-semibold text-[28px] leading-tight text-primary-container tracking-tight">
                Verify Your Number
            </h1>
<p class="font-body text-[14px] text-secondary mt-3 leading-relaxed">

</p>
</section>
<!-- Social Alternative (Google Sign-In Ghost Button) -->
<section class="mb-12">
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 border border-outline-variant rounded-xl bg-transparent hover:bg-surface-container-low transition-all duration-300 active:scale-[0.98]">

<span class="font-body font-bold text-sm tracking-tight text-on-surface-variant">Continue with Google</span>
</button>
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-outline-variant opacity-30"></div>
<span class="font-label text-[10px] uppercase tracking-widest text-outline">Or enter code</span>
<div class="h-[1px] flex-1 bg-outline-variant opacity-30"></div>
</div>
</section>
<!-- OTP Input Area -->
<section class="flex flex-col items-center">
<div class="grid grid-cols-6 gap-2 w-full max-w-sm mb-6">
<!-- Inputs with border logic from prompt -->
<input autocomplete="one-time-code" autofocus="" class="otp-input w-full h-14 bg-surface-container-lowest border border-[#CBD5E0] focus:border-primary-container focus:ring-0 rounded-[10px] text-center text-xl font-bold text-primary transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-input w-full h-14 bg-surface-container-lowest border border-[#CBD5E0] focus:border-primary-container focus:ring-0 rounded-[10px] text-center text-xl font-bold text-primary transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-input w-full h-14 bg-surface-container-lowest border border-[#CBD5E0] focus:border-primary-container focus:ring-0 rounded-[10px] text-center text-xl font-bold text-primary transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-input w-full h-14 bg-surface-container-lowest border border-[#CBD5E0] focus:border-primary-container focus:ring-0 rounded-[10px] text-center text-xl font-bold text-primary transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-input w-full h-14 bg-surface-container-lowest border border-[#CBD5E0] focus:border-primary-container focus:ring-0 rounded-[10px] text-center text-xl font-bold text-primary transition-all duration-200" maxlength="1" type="text"/>
<input class="otp-input w-full h-14 bg-surface-container-lowest border border-[#CBD5E0] focus:border-primary-container focus:ring-0 rounded-[10px] text-center text-xl font-bold text-primary transition-all duration-200" maxlength="1" type="text"/>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-on-tertiary-container">schedule</span>
<p class="font-body text-sm font-semibold text-[#D4820A]">
                    Resend in 0:42
                </p>
</div>
</section>
<!-- Illustration / Contextual Graphic (Asymmetric Layout element) -->
<div class="mt-auto mb-12 relative overflow-hidden h-40 rounded-3xl bg-surface-container-low flex items-center justify-center group">
<div class="absolute inset-0 opacity-10 bg-no-repeat bg-cover bg-center transition-transform duration-700 group-hover:scale-110" data-alt="Close up of dry organic soil texture with subtle green sprouts emerging in soft afternoon sunlight" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCFCnBahi-CbTI02pDIAoi5jXjzJ3NqfhuSr1xa-R8YGxAjqadkxY_2eCV2kPEwNPVy0PZE8u_VanvWNnah0HiyXnog8R5445tlNz86EwNCYwfYsquCyB3_PBk4f0ZKSDW45PpFgonMm9OMbVxEhNY-r3RX7ZANGmEPXkwfeOdkPw8K99CqROdcYtnxdVFdSOJbnXSq_-qmkS-EmMYA4yqWW1KFng9iHPx3f0McFGlRUKPU89u18PolYZ2P7YqSN14KZZbpZI1GkqJy')"></div>

<span class="material-symbols-outlined text-primary-container opacity-20 text-4xl mb-2">shield_lock</span>
<p class="font-label text-[11px] uppercase tracking-widest text-outline-variant">Secure Field Access Protocol</p>
</div>
</div>
<!-- Primary Action -->
<footer class="pb-10">
<button class="w-full py-4 px-8 bg-primary-container text-surface-bright rounded-full font-bold text-base shadow-lg shadow-primary-container/10 active:scale-95 transition-all duration-200">
                Verify &amp; Continue
            </button>
<p class="text-center mt-6 font-body text-[12px] text-outline">
                By continuing, you agree to the <a class="text-primary font-semibold underline decoration-primary/20" href="#">Terms of Service</a>
</p>
</footer>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary-container/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-tertiary-container/5 blur-[150px] rounded-full pointer-events-none"></div>
